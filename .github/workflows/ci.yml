name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  unit:
    name: Unit and Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun run test:unit

      - name: Run typecheck
        run: bun run typecheck

  integration:
    name: Integration (PostgreSQL)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://luxledger:luxledger@127.0.0.1:5432/luxledger_test
      DATABASE_URL_TEST: postgresql://luxledger:luxledger@127.0.0.1:5432/luxledger_test
      NODE_ENV: test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: luxledger
          POSTGRES_PASSWORD: luxledger
          POSTGRES_DB: luxledger_test
          TZ: UTC
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U luxledger -d luxledger_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check PostgreSQL connectivity
        run: bun run db:check:test

      - name: Reset test database
        run: bun run db:reset:test

      - name: Run migrations
        run: bun run db:migrate:test

      - name: Run integration tests
        run: bun run test:integration:files
